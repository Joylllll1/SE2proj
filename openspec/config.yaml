schema: spec-driven

context: |
  Tech stack: React + Vite (frontend), Node.js + Express + MongoDB (backend)
  Styling: Tailwind CSS
  Language: Chinese UI (简体中文)
  Project: NJU树洞 — 校园匿名社区平台
  核心特性: 帖子级匿名、低压力表达、内容治理
  目标用户: 南京大学师生

  当前阶段: 前端功能开发中
  已实现: 首页/详情/发帖/收藏/公告/热门/设置/管理员页面、侧边栏、通知、点赞/评论/举报/搜索、AI面板、每日运势、轮播图
  待完善: 后端 API 对接、用户认证、数据持久化、更多交互细节

rules:
  proposal:
    - 用中文撰写
    - 包含"非目标"章节
  tasks:
    - 每个任务控制在 2 小时以内
    - 前端任务优先，后端配合
